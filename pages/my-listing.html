<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Listings - VitMart</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .listings-container { max-width: 1000px; margin: 40px auto; }
        .listings-container h2 { text-align: center; margin-bottom: 20px; }
        .listing-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(0,0,0,.1); display: flex; gap: 20px; }
        .listing-card img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; }
        .listing-info { flex: 1; }
        .listing-info h3 { margin-bottom: 5px; }
        .listing-info .price { font-size: 18px; font-weight: 700; color: #0a66c2; }
        .listing-info .status { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-available { background: #dcfce7; color: #15803d; }
        .status-sold { background: #fee2e2; color: #b91c1c; }
        .listing-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .listing-actions button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-edit { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .btn-sold { background: #0a66c2; color: white; }
        .btn-available { background: #15803d; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-view { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .loader { text-align: center; padding: 60px; color: #777; }
        .empty { text-align: center; padding: 60px; color: #777; }
    </style>
</head>
<body>
<nav>
    <h1 class="logo"><span class="vit">VIT</span><span class="mart">Mart</span></h1>
    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="create-listing.html">Sell Item</a></li>
        <li><a href="login.html" id="nav-logout">Logout</a></li>
    </ul>
</nav>

<div class="listings-container">
    <h2>My Listings</h2>
    <div id="loader" class="loader">Loading your listings...</div>
    <div id="listings"></div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

async function loadListings() {
    try {
        const res = await fetch('/my-listings', {
            headers: { 'Accept': 'application/json', 'Authorization': `Bearer ${token}` }
        });
        const listings = await res.json();
        const container = document.getElementById('listings');
        const loader = document.getElementById('loader');
        loader.style.display = 'none';

        if (!listings || listings.length === 0) {
            container.innerHTML = '<div class="empty">You have no listings yet. <a href="create-listing.html">Create one now!</a></div>';
            return;
        }

        listings.forEach(product => {
            const card = document.createElement('div');
            card.className = 'listing-card';

            const imgUrl = product.images && product.images.length > 0 
                ? `/storage/${product.images[0].image_path}` 
                : 'https://via.placeholder.com/120?text=No+Image';

            card.innerHTML = `
                <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/120?text=No+Image'">
                <div class="listing-info">
                    <h3>${escapeHtml(product.title)}</h3>
                    <p>${escapeHtml(product.category?.name || 'Others')}</p>
                    <div class="price">₹${Number(product.price).toLocaleString()}</div>
                    <p><span class="status status-${product.status}">${product.status.toUpperCase()}</span></p>
                    <div class="listing-actions">
                        <button class="btn-view" onclick="window.open('product.html?id=${product.id}','_blank')">View</button>
                        ${product.status === 'available' 
                            ? `<button class="btn-sold" onclick="markSold(${product.id})">Mark Sold</button>` 
                            : `<button class="btn-available" onclick="markAvailable(${product.id})">Mark Available</button>`}
                        <button class="btn-delete" onclick="deleteListing(${product.id})">Delete</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    } catch(e) {
        document.getElementById('loader').textContent = 'Failed to load listings.';
    }
}

async function markSold(id) {
    if (!confirm('Mark this listing as sold?')) return;
    try {
        await fetch(`/products/${id}/sold`, {
            method: 'PATCH',
            headers: { 'Accept': 'application/json', 'Authorization': `Bearer ${token}` }
        });
        location.reload();
    } catch(e) { alert('Failed to update.'); }
}

async function markAvailable(id) {
    if (!confirm('Mark this listing as available again?')) return;
    try {
        await fetch(`/products/${id}/available`, {
            method: 'PATCH',
            headers: { 'Accept': 'application/json', 'Authorization': `Bearer ${token}` }
        });
        location.reload();
    } catch(e) { alert('Failed to update.'); }
}

async function deleteListing(id) {
    if (!confirm('Delete this listing permanently?')) return;
    try {
        await fetch(`/products/${id}`, {
            method: 'DELETE',
            headers: { 'Accept': 'application/json', 'Authorization': `Bearer ${token}` }
        });
        location.reload();
    } catch(e) { alert('Failed to delete.'); }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"');
}

loadListings();
</script>
</body>
</html>
