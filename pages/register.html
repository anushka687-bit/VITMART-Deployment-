<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VitMart</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav>
    <h1 class="logo">
        <span class="vit">VIT</span><span class="mart">Mart</span>
    </h1>
    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Register with your VIT college email</p>

        <div id="register-form">
            <input type="text" id="reg-name" placeholder="Full Name" required>
            <input type="email" id="reg-email" placeholder="College Email (@vitstudent.ac.in or @vit.ac.in)" required>
            <input type="password" id="reg-password" placeholder="Password (min 8 characters)" required>
            <input type="password" id="reg-password-confirm" placeholder="Confirm Password" required>
            <input type="text" id="reg-phone" placeholder="Phone (optional)">
            <input type="text" id="reg-block" placeholder="Hostel Block (optional)">
            <div id="reg-error" class="error-message" style="display:none; color:red; text-align:center; margin-bottom:15px;"></div>
            <button class="auth-btn" id="reg-btn">Register & Send OTP</button>
        </div>

        <div id="otp-form" style="display:none;">
            <p style="text-align:center; color:#555; margin-bottom:15px;">Enter the 6-digit OTP sent to your email</p>
            <input type="text" id="reg-otp" placeholder="Enter OTP" maxlength="6">
            <div id="otp-error" class="error-message" style="display:none; color:red; text-align:center; margin-bottom:15px;"></div>
            <button class="auth-btn" id="verify-btn">Verify OTP</button>
            <p class="auth-link">
                Didn't receive? <a href="#" id="resend-otp-link">Resend OTP</a>
            </p>
        </div>

        <p class="auth-link">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script>
let registeredEmail = '';

document.getElementById('reg-btn').addEventListener('click', async () => {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    const passwordConfirmation = document.getElementById('reg-password-confirm').value;
    const phone = document.getElementById('reg-phone').value;
    const block = document.getElementById('reg-block').value;
    const errorEl = document.getElementById('reg-error');

    if (!name || !email || !password || !passwordConfirmation) {
        errorEl.textContent = 'Please fill in all required fields.';
        errorEl.style.display = 'block';
        return;
    }
    if (password !== passwordConfirmation) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
    }

    try {
        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ name, email, password, password_confirmation: passwordConfirmation, phone, block })
        });
        const data = await res.json();
        if (!res.ok) {
            errorEl.textContent = data.errors?.[Object.keys(data.errors)[0]]?.[0] || data.message || 'Registration failed.';
            errorEl.style.display = 'block';
            return;
        }
        registeredEmail = email;
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('otp-form').style.display = 'block';
        errorEl.style.display = 'none';
    } catch (e) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
});

document.getElementById('verify-btn').addEventListener('click', async () => {
    const otp = document.getElementById('reg-otp').value;
    const errorEl = document.getElementById('otp-error');

    if (!otp || otp.length !== 6) {
        errorEl.textContent = 'Please enter a valid 6-digit OTP.';
        errorEl.style.display = 'block';
        return;
    }

    try {
        const res = await fetch('/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ email: registeredEmail, otp })
        });
        const data = await res.json();
        if (!res.ok) {
            errorEl.textContent = data.message || 'Verification failed.';
            errorEl.style.display = 'block';
            return;
        }
        localStorage.setItem('token', data.token);
        window.location.href = '/';
    } catch (e) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
});

document.getElementById('resend-otp-link').addEventListener('click', async (e) => {
    e.preventDefault();
    if (!registeredEmail) return;
    try {
        await fetch('/auth/resend-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ email: registeredEmail })
        });
        alert('OTP resent to your email.');
    } catch (e) {
        alert('Failed to resend OTP.');
    }
});
</script>

</body>
</html>
