<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Item - VitMart</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .form-container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,.1); }
        .form-container h2 { text-align: center; margin-bottom: 20px; }
        .form-container input, .form-container select, .form-container textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-container textarea { resize: vertical; min-height: 100px; }
        .form-container label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-bottom: 0; }
        .preview-images { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .preview-images img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; }
        .error-msg { color: red; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
<nav>
    <h1 class="logo"><span class="vit">VIT</span><span class="mart">Mart</span></h1>
    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="my-listing.html">My Listings</a></li>
        <li><a href="login.html" id="nav-logout">Logout</a></li>
    </ul>
</nav>

<div class="form-container">
    <h2>Create a New Listing</h2>
    <p class="auth-subtitle">Sell your items to fellow VIT students</p>
    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" style="display:none; color:green; text-align:center; margin-bottom:15px;"></div>

    <form id="listing-form">
        <label for="category_id">Category *</label>
        <select id="category_id" required>
            <option value="">Select Category</option>
        </select>

        <label for="title">Title *</label>
        <input type="text" id="title" placeholder="e.g. Engineering Physics Book" required>

        <label for="description">Description *</label>
        <textarea id="description" placeholder="Describe your item in detail..." required></textarea>

        <label for="price">Price (₹) *</label>
        <input type="number" id="price" placeholder="e.g. 500" min="0" required>

        <label for="condition">Condition *</label>
        <select id="condition" required>
            <option value="new">New</option>
            <option value="like_new">Like New</option>
            <option value="good">Good</option>
            <option value="fair">Fair</option>
        </select>

        <div class="checkbox-group">
            <input type="checkbox" id="negotiable">
            <label for="negotiable" style="margin:0">Price is Negotiable</label>
        </div>

        <label for="images">Images * (up to 6)</label>
        <input type="file" id="images" multiple accept="image/*">
        <div class="preview-images" id="image-preview"></div>

        <button type="submit" class="auth-btn">Post Listing</button>
    </form>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

// Load categories
fetch('/categories', { headers: { 'Accept': 'application/json' } })
    .then(r => r.json())
    .then(categories => {
        const select = document.getElementById('category_id');
        categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat.id;
            opt.textContent = cat.name;
            select.appendChild(opt);
        });
    });

// Image preview
document.getElementById('images').addEventListener('change', function() {
    const preview = document.getElementById('image-preview');
    preview.innerHTML = '';
    for (const file of this.files) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
    }
});

document.getElementById('listing-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById('error-msg');

    const formData = new FormData();
    formData.append('category_id', document.getElementById('category_id').value);
    formData.append('title', document.getElementById('title').value);
    formData.append('description', document.getElementById('description').value);
    formData.append('price', document.getElementById('price').value);
    formData.append('condition', document.getElementById('condition').value);
    formData.append('negotiable', document.getElementById('negotiable').checked ? '1' : '0');

    const files = document.getElementById('images').files;
    if (files.length === 0) {
        errorEl.textContent = 'Please select at least one image.';
        errorEl.style.display = 'block';
        return;
    }
    for (const file of files) {
        formData.append('images[]', file);
    }

    try {
        const res = await fetch('/products', {
            method: 'POST',
            headers: {
                'Accept': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: formData
        });
        const data = await res.json();
        if (!res.ok) {
            const msg = data.errors ? Object.values(data.errors).flat()[0] : data.message;
            errorEl.textContent = msg || 'Failed to create listing.';
            errorEl.style.display = 'block';
            return;
        }
        document.getElementById('success-msg').textContent = 'Listing created successfully!';
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('listing-form').reset();
        document.getElementById('image-preview').innerHTML = '';
        errorEl.style.display = 'none';
        setTimeout(() => window.location.href = 'my-listing.html', 1500);
    } catch (e) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
});
</script>
</body>
</html>
