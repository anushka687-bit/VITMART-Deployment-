<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VitMart</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<nav>
    <h1 class="logo">
        <span class="vit">VIT</span><span class="mart">Mart</span>
    </h1>
    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
    </ul>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2 id="form-title">Welcome Back</h2>
        <p class="auth-subtitle" id="form-subtitle">
            Login to access your VitMart account
        </p>

        <input type="email" id="login-email" placeholder="College Email">
        <input type="password" id="login-password" placeholder="Password">
        <div id="error-msg" class="error-message" style="display:none; color:red; text-align:center; margin-bottom:15px;"></div>

        <button class="auth-btn" id="login-btn">Login</button>

        <p class="auth-link" id="register-link">
            Don't have an account?
            <a href="register.html">Register</a>
        </p>
    </div>
</div>

<script>
// Check URL params for admin redirect
const params = new URLSearchParams(window.location.search);
const isAdmin = params.get('admin') === '1';

if (isAdmin) {
    document.getElementById('form-title').textContent = 'Admin Login';
    document.getElementById('form-subtitle').textContent = 'Login to access the admin panel';
}

document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('error-msg');

    if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
    }

    try {
        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            errorEl.textContent = data.message || data.errors?.[Object.keys(data.errors)[0]]?.[0] || 'Login failed.';
            errorEl.style.display = 'block';
            return;
        }

        // Store token
        localStorage.setItem('token', data.token);

        // If admin login, also store admin_token and redirect
        if (data.user && data.user.role === 'admin') {
            localStorage.setItem('admin_token', data.token);
            window.location.href = '/admin-panel';
        } else if (isAdmin) {
            errorEl.textContent = 'You do not have admin access.';
            errorEl.style.display = 'block';
        } else {
            window.location.href = '/';
        }
    } catch (e) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
});
</script>

</body>
</html>
