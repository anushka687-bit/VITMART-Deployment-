<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitMart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h1 class="logo">
        <span class="vit">VIT</span><span class="mart">Mart</span>
    </h1>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="pages/login.html">Login</a></li>
        <li><a href="pages/register.html">Register</a></li>
        <li><a href="pages/create-listing.html">Sell Item</a></li>
    </ul>
</nav>

<section class="hero">

    <h2>Buy & Sell Within VIT Campus</h2>

    <p>
        Buy textbooks, electronics, cycles, hostel essentials and more
        directly from fellow VIT students.
    </p>

    <div class="hero-buttons">
        <button class="primary-btn">Sell an Item</button>
        <button class="secondary-btn">Browse Listings</button>
    </div>

    <input type="text" placeholder="Search products...">

</section>

<div class="categories">
    <button class="category-btn">📚 Books</button>
    <button class="category-btn">💻 Electronics</button>
    <button class="category-btn">🚲 Cycles</button>
    <button class="category-btn">🏠 Hostel Essentials</button>
    <button class="category-btn">👕 Fashion</button>
    <button class="category-btn">🎯 Others</button>
</div>

<section class="featured-section">
    <h2>Featured Listings</h2>
    <p>Recently added products by VIT students</p>
</section>

<section id="products"></section>

<footer>
    <p>© 2026 VitMart | Marketplace for VIT Students</p>
</footer>

<script src="script.js"></script>

</body>
</html>
